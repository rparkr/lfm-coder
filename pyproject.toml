[project]
name = "lfm-coder"
version = "0.1.0"
description = "Using GRPO with RLVR, train Liquid AI's LFM2.5-instruct model to enhance coding capabilities"
readme = "README.md"
authors = [{ name = "Ryan Parker", email = "ryanparker.ml@gmail.com" }]
requires-python = ">=3.13"
dependencies = [
    "bitsandbytes>=0.49.2",
    "datasets>=4.6.1",
    "liger-kernel>=0.7.0",
    "pydantic-monty>=0.0.7",
    "tqdm>=4.67.3",
    "trackio>=0.18.0",
    "trl[peft]>=0.29.0",
]

[dependency-groups]
dev = ["pytest>=9.0.2", "ruff>=0.15.5"]

[build-system]
requires = ["uv_build>=0.10.8,<0.11.0"]
build-backend = "uv_build"
