name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Build a binary wheel and a source tarball
        run: uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # Define the environment name matching your PyPI settings
    environment:
      name: pypi
      url: https://pypi.org/p/lfm-coder

    permissions:
      # Mandatory permission for OIDC Trusted Publishing
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      # Uses the official PyPA action to exchange OIDC token for PyPI token
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
