name: Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Build Docker container image
        run: |
          docker build --tag lfm-coder-sandbox:latest \
            --file src/lfm_coder/sandbox/Dockerfile.sandbox .

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          # Explicitly enable caching (though true by default)
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linter
        run: uv run ruff check src/

      - name: Run type checker
        run: uv run ty check src/

      - name: Run tests
        run: uv run pytest tests/ --cov=src --cov-report=term-missing

  test-podman:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # GitHub's hosted runners include Podman by default; if we need a
      # specific version, we can install it using:
      # - name: Set up Podman
      #   uses: redhat-actions/podman-install@main

      - name: Check Podman version
        run: podman --version

      - name: Build Docker container image
        run: |
          podman build --tag lfm-coder-sandbox:latest \
            --file src/lfm_coder/sandbox/Dockerfile.sandbox .

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          # Explicitly enable caching (though true by default)
          enable-cache: true
          cache-dependency-glob: "uv.lock"


      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linter
        run: uv run ruff check src/

      - name: Run type checker
        run: uv run ty check src/

      - name: Run tests
        run: uv run pytest tests/ --cov=src --cov-report=term-missing
